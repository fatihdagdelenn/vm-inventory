{% extends "base.html" %}
{% block content %}
<div class="d-flex mb-3 gap-2">
  <div class="search-box flex-grow-1" style="max-width:480px">
    <i class="bi bi-search"></i>
    <input type="text" id="hostSearch" class="form-control" placeholder="Host adı, IP, cluster veya CPU modeli ara…">
  </div>
  <button class="btn btn-outline-success btn-sm ms-auto" onclick="location='/api/reports/hosts/export?fmt=xlsx'"><i class="bi bi-file-earmark-excel"></i> Excel</button>
  <button class="btn btn-outline-secondary btn-sm" onclick="location='/api/reports/hosts/export?fmt=csv'">CSV</button>
  <button class="btn btn-outline-danger btn-sm" onclick="location='/api/reports/hosts/export?fmt=pdf'">PDF</button>
</div>
<div class="card panel">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0" id="hostTable">
      <thead><tr>
        <th data-sort="name" class="sortable">Host Adı</th>
        <th data-sort="mgmt_ip" class="sortable">Yönetim IP</th>
        <th data-sort="os_version" class="sortable">İşletim Sistemi</th>
        <th data-sort="cpu_model" class="sortable">CPU Modeli</th>
        <th data-sort="cpu_cores" class="sortable">Çekirdek</th>
        <th data-sort="ram" class="sortable">RAM</th>
        <th data-sort="disk" class="sortable">Disk</th>
        <th data-sort="cluster" class="sortable">Cluster</th>
        <th data-sort="vm_count" class="sortable">VM</th>
        <th data-sort="uptime" class="sortable">Uptime</th>
        <th data-sort="status" class="sortable">Durum</th>
      </tr></thead>
      <tbody id="hostBody"><tr><td colspan="11" class="text-center text-muted p-4">Yükleniyor…</td></tr></tbody>
    </table>
  </div>
</div>

{% endblock %}
{% block scripts %}<script src="/static/js/hosts.js?v={{ asset_version }}"></script>{% endblock %}
