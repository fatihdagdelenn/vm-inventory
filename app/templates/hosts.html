{% extends "base.html" %}
{% block content %}
<div class="net-stats mb-3" id="hostStats"></div>
<div class="net-toolbar mb-3">
  <div class="search-box">
    <i class="bi bi-search"></i>
    <input type="text" id="hostSearch" class="form-control" data-i18n-ph="hs.searchPh"
           placeholder="Host adı, IP, cluster veya CPU modeli ara…">
  </div>
  <div class="btn-group net-modes" role="group" aria-label="Görünüm">
    <button class="btn btn-sm active" data-mode="cards" data-i18n="ds.cards">Kartlar</button>
    <button class="btn btn-sm" data-mode="cluster" data-i18n="vm.byCluster">Cluster'a göre</button>
    <button class="btn btn-sm" data-mode="table" data-i18n="ds.table">Tablo</button>
  </div>
  <div class="net-actions">
    <button class="btn btn-outline-success btn-sm" onclick="location='/api/reports/hosts/export?fmt=xlsx'"><i class="bi bi-file-earmark-excel"></i> Excel</button>
    <button class="btn btn-outline-secondary btn-sm" onclick="location='/api/reports/hosts/export?fmt=csv'">CSV</button>
    <button class="btn btn-outline-danger btn-sm" onclick="location='/api/reports/hosts/export?fmt=pdf'">PDF</button>
  </div>
</div>
<div id="hostGroups">
  <div class="text-center text-muted p-4" data-i18n="common.loading">Yükleniyor…</div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/hosts.js?v={{ asset_version }}"></script>{% endblock %}
