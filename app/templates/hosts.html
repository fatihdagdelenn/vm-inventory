{% extends "base.html" %}
{% block content %}
<div class="d-flex mb-3 gap-2">
  <div class="search-box flex-grow-1" style="max-width:480px">
    <i class="bi bi-search"></i>
    <input type="text" id="hostSearch" class="form-control" placeholder="Host adı, IP, cluster veya CPU modeli ara…">
  </div>
  <button class="btn btn-outline-success btn-sm ms-auto" onclick="location='/api/reports/hosts/export?fmt=xlsx'"><i class="bi bi-file-earmark-excel"></i> Excel</button>
  <button class="btn btn-outline-secondary btn-sm" onclick="location='/api/reports/hosts/export?fmt=csv'">CSV</button>
  <button class="btn btn-outline-danger btn-sm" onclick="location='/api/reports/hosts/export?fmt=pdf'">PDF</button>
</div>
<div class="card panel">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0" id="hostTable">
      <thead><tr>
        <th>Host Adı</th><th>Yönetim IP</th><th>İşletim Sistemi</th><th>CPU Modeli</th>
        <th>Çekirdek</th><th>RAM</th><th>Disk</th><th>Cluster</th><th>VM</th><th>Durum</th>
      </tr></thead>
      <tbody id="hostBody"><tr><td colspan="10" class="text-center text-muted p-4">Yükleniyor…</td></tr></tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/hosts.js?v={{ asset_version }}"></script>{% endblock %}
