{% extends "base.html" %}
{% block content %}
<div class="net-toolbar mb-3">
  <div class="search-box">
    <i class="bi bi-search"></i>
    <input type="text" id="netSearch" class="form-control"
           placeholder="Ad, VLAN, vSwitch, subnet, MAC veya host ara…">
  </div>
  <div class="btn-group net-modes" role="group" aria-label="Gruplama">
    <button class="btn btn-sm active" data-mode="host">Host'a göre</button>
    <button class="btn btn-sm" data-mode="cluster">Cluster'a göre</button>
    <button class="btn btn-sm" data-mode="vlan">VLAN'a göre</button>
    <button class="btn btn-sm" data-mode="pnic">Fiziksel Kartlar</button>
  </div>
  <div class="net-actions">
    <button class="btn btn-sm btn-link" id="netExpandAll">Tümünü aç</button>
    <button class="btn btn-sm btn-link" id="netCollapseAll">Tümünü kapat</button>
  </div>
</div>
<div id="netGroups">
  <div class="text-center text-muted p-4">Yükleniyor…</div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/networks.js?v={{ asset_version }}"></script>{% endblock %}
