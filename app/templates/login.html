<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — VM Envanter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/custom.css?v={{ asset_version }}" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="bi bi-hdd-network login-logo"></i>
      <h1 class="h4 mt-2 mb-0">VM Envanter Yönetim Sistemi</h1>
      <p class="text-muted small">VMware vCenter &amp; Proxmox VE</p>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-triangle"></i> Kullanıcı adı veya parola hatalı.
    </div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Kullanıcı adı</label>
        <input type="text" name="username" class="form-control" required autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label">Parola</label>
        <input type="password" name="password" class="form-control" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-100">Giriş yap</button>
    </form>
  </div>
</body>
</html>
