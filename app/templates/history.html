{% extends "base.html" %}
{% block content %}
<div class="d-flex mb-3 gap-2">
  <div class="search-box flex-grow-1" style="max-width:420px">
    <i class="bi bi-search"></i>
    <input type="text" id="histSearch" class="form-control" placeholder="VM veya host adı ara…">
  </div>
  <select id="histEntity" class="form-select form-select-sm w-auto">
    <option value="">Tümü</option><option value="vm">VM</option><option value="host">Host</option>
  </select>
</div>
<div class="card panel">
  <div class="table-responsive">
    <table class="table table-sm table-hover align-middle mb-0">
      <thead><tr>
        <th>Tarih</th><th>Tip</th><th>Ad</th><th>Değişiklik</th><th>Alan</th><th>Eski Değer</th><th>Yeni Değer</th>
      </tr></thead>
      <tbody id="histBody"><tr><td colspan="7" class="text-center text-muted p-4">Yükleniyor…</td></tr></tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/history.js?v={{ asset_version }}"></script>{% endblock %}
